<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crooked Road</title>
    <link rel="icon" href="https://crookedroad.github.io/sites-pages/icons/crookedRoad_icon.png">
    <style>
        :root {
            /* Основной фон всей страницы */
            --bg-color: #111112;
            /* Цвет текста */
            --text-color: #f8fafc;
            /* Цвет подложки под всем блоком */
            --main-panel-bg: #14171c;
            /* Цвет самих кнопок-ссылок внутри блока */
            --card-bg: #1e293b;
            /* Цвет кнопок при наведении */
            --card-hover: #334155;
            /* Акцентный цвет (для обводки и подзаголовков) */
            --accent-color: #ec8a05;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
            background-color: var(--main-panel-bg);
            padding: 40px 32px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);

            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        /* Описание эффекта выезда снизу */
        @keyframes slideUp {
            from {
                transform: translateY(100px); /* Стартовая позиция: смещен вниз на 100px */
                opacity: 0;                   /* Полностью прозрачный */
            }
            to {
                transform: translateY(0);     /* Конечная позиция: на своем месте */
                opacity: 1;                   /* Полностью видимый */
            }
        }

        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .description {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background-color: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        /* Стиль для маленьких аватарок на кнопках */
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0; /* Чтобы картинка не сжималась */
            background-color: rgba(255, 255, 255, 0.1); /* Фон на случай долгой загрузки */
        }

        /* Выравнивание текста строго по центру кнопки */
        .btn-text {
            flex-grow: 1;
            text-align: center;
            padding-right: 32px; /* Компенсируем ширину иконки, чтобы текст был ровно по центру */
        }

        /* Стили для подзаголовков между кнопками */
        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-color);
            text-align: center;
            margin-top: 12px;
            margin-bottom: 4px;
            padding-left: 4px;
            opacity: 0.9;
        }

        .link-card:hover {
            background-color: var(--card-hover);
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }

        .link-card:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Аватарка -->
        <img class="profile-img" src="https://p16-common-sign.tiktokcdn-eu.com/tos-no1a-avt-0068c001-no/9db11fe45c267a75f8443a54350fbb57~tplv-tiktokx-cropcenter:1080:1080.jpeg?dr=10399&refresh_token=68bffad2&x-expires=1781010000&x-signature=uYWrprdLh7JPGqmffwT7XgMMAIM%3D&t=4d5b0474&ps=13740610&shp=a5d48078&shcp=81f88b70&idc=no1a" alt="Профиль">

        <!-- Имя или Название проекта -->
        <h1>Crooked Road</h1>

        <!-- Краткое описание -->
        <p class="description">Добро пожаловать! Здесь собраны все ссылки на мои социальные сети и актуальные проекты.</p>

        <!-- Список кнопок-ссылок -->
        <div class="links-container">
            <div class="section-title">Свежие новости разработки</div>
            <a href="https://t.me/crooked_road" target="_blank" class="link-card">
                <img class="btn-icon" src="https://crookedroad.github.io/sites-pages/icons/telegram_logo.png" alt="Telegram">
                <span class="btn-text">Telegram канал</span>
            </a>
            <a href="https://vk.com/crooked_road" target="_blank" class="link-card">
                <img class="btn-icon" src="https://crookedroad.github.io/sites-pages/icons/vk_logo.png" alt="ВКонтакте">
                <span class="btn-text">Сообщество ВКонтакте</span>
            </a>

            <div class="section-title">Проекты в Steam</div>
            <a href="https://store.steampowered.com/app/4095190/Angels_Dreams/" target="_blank" class="link-card">
                <img class="btn-icon" src="https://crookedroad.github.io/sites-pages/icons/angelDreams_icon.png" alt="Angel`s Dreams">
                <span class="btn-text">Angel`s Dreams</span>
            </a>
            <a href="https://store.steampowered.com/app/2799360/iZolated/" target="_blank" class="link-card">
                <img class="btn-icon" src="https://crookedroad.github.io/sites-pages/icons/iZolated_icon.png" alt="iZolated">
                <span class="btn-text">iZolated</span>
            </a>
        </div>
    </div>

</body>
</html>
